<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#1A1A1A"/>
  
  <!-- Stylized 'A' in Cormorant Garamond inspired serif style -->
  <g transform="translate(32, 34)">
    <!-- Main 'A' shape -->
    <path d="M-2.5 -20 L-14 16 L-9.5 16 L-7 9 L7 9 L9.5 16 L14 16 L2.5 -20 Z M-5.5 5 L0 -12 L5.5 5 Z" fill="#FAF8F5"/>
    
    <!-- Decorative serif on top -->
    <path d="M-5 -20 L5 -20 L4 -18 L-4 -18 Z" fill="#FAF8F5"/>
    
    <!-- Decorative serif on bottom-left -->
    <path d="M-15.5 16 L-15.5 14 L-8 14 L-8 16 Z" fill="#FAF8F5"/>
    
    <!-- Decorative serif on bottom-right -->
    <path d="M8 16 L8 14 L15.5 14 L15.5 16 Z" fill="#FAF8F5"/>
  </g>
  
  <!-- Gold dot (brand signature) -->
  <circle cx="50" cy="49" r="3.5" fill="#C6A96C"/>
</svg>
